<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Geocofrade - Localizador de pasos de Semana Santa en San Fernando</title>
    <link rel="manifest" href="manifest.json">
    <meta  name="theme-color" content="#800020">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <main id="map"></main>
    <nav>
        <button class="tool-btn" onclick="togglemenu('panel-principal')" title="Menú">
            <i class="fa-solid fa-bars-staggered"></i>
        </button>
        <button class="tool-btn" onclick="cambiarModo()" title="Cambiar vista">
            <i class="fa-solid fa-sun"></i>
        </button>
    </nav>

    <aside id="panel-principal">
        <button class="close-btn" onclick="togglemenu('panel-principal')">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <ul>
            <li>
                <button class="menu-item" onclick="mostrarSeccion('hermandades')">
                    <i class="fa-solid fa-church"></i> Hermandades
                </button>
            </li>
            <li>
                <button class="menu-item" onclick="mostrarSeccion('calendario')">
                    <i class="fa-solid fa-calendar-days"></i> Calendario
                </button>
            </li>
            <li>
                <button class="menu-item" onclick="mostrarSeccion('ajustes')">
                    <i class="fa-solid fa-gear"></i> Ajustes
                </button>
            </li>
        </ul>
    </aside>

    <section class="cards">
        <article id="weather-card">
            <div id="w-icon">🌦️</div>
            <div id="w-data">
                <p id="w-temp">20ºC</p>
                <div id="w-details">
                    <span class="detail-weather">💨 <span id="w-viento">15 Km/h</span></span>
                    <span class="detail-weather">🌧️ <span id="w-lluvia">10%</span></span>
                </div>
            </div>
        </article>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
